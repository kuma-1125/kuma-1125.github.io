<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
    <title>🧋 小玉专属奶茶店</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', system-ui, sans-serif;
            background: linear-gradient(145deg, #fce8e0 0%, #f9d8c6 100%);
            min-height: 100vh;
            padding: 20px 12px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(255, 247, 240, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 44px;
            padding: 28px 24px 32px;
            box-shadow: 0 25px 45px rgba(160, 100, 60, 0.2), 0 4px 12px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 500;
            color: #5e3c28;
            margin-bottom: 4px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sub-title {
            text-align: center;
            color: #8b6848;
            margin-bottom: 28px;
            font-size: 0.95rem;
            font-weight: 400;
            border-bottom: 2px dashed #dbb594;
            padding-bottom: 16px;
        }

        .brand {
            margin-bottom: 24px;
            background: #fffef9;
            border-radius: 32px;
            padding: 18px 16px 14px;
            box-shadow: 0 8px 18px rgba(140, 90, 40, 0.08);
            border: 1px solid #f3dfcd;
        }

            .brand h2 {
                font-size: 1.3rem;
                font-weight: 580;
                color: #7b4a2c;
                margin-bottom: 14px;
                display: flex;
                align-items: center;
                gap: 6px;
                letter-spacing: 0.4px;
            }

        .tea-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tea-card {
            flex: 1 1 130px;
            min-width: 120px;
            background: #fffbf5;
            border: 1.5px solid #eedbcb;
            border-radius: 26px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            text-align: center;
        }

            .tea-card.active {
                border-color: #d48c5c;
                background: #fff6ec;
                box-shadow: 0 12px 22px rgba(200, 110, 40, 0.18);
                transform: translateY(-2px);
            }

        .tea-name {
            font-weight: 550;
            color: #5a3722;
            font-size: 0.98rem;
            line-height: 1.3;
        }

        .size-row {
            display: flex;
            gap: 14px;
            margin-top: 14px;
            align-items: center;
            flex-wrap: wrap;
        }

        .size-btn {
            flex: 1;
            background: #faf3eb;
            border: 1px solid #ddc1aa;
            border-radius: 28px;
            padding: 10px 8px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #5b3e2a;
            cursor: pointer;
            transition: 0.18s;
            text-align: center;
            background: #fff9f2;
        }

            .size-btn.active {
                background: #dba478;
                border-color: #b87145;
                color: white;
                font-weight: 600;
                box-shadow: 0 6px 14px rgba(180, 100, 40, 0.3);
            }

        .remark-box {
            width: 100%;
            margin-top: 14px;
            background: #fffcf7;
            border: 1px solid #e2ceb8;
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: #4a3420;
            resize: vertical;
            font-family: inherit;
        }

        .btn-order {
            background: #c8794a;
            border: none;
            border-radius: 60px;
            padding: 18px 28px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #d18b5a, #b35f33);
            box-shadow: 0 12px 24px rgba(170, 90, 30, 0.28);
            cursor: pointer;
            transition: 0.22s;
            margin-top: 18px;
            width: 100%;
            border: 1px solid #ffffff60;
        }

            .btn-order:active {
                transform: scale(0.97);
                background: #a2532e;
            }

        .footer-note {
            text-align: center;
            margin-top: 18px;
            color: #b48b6b;
            font-size: 0.8rem;
        }

        .selected-summary {
            margin: 8px 0 4px;
            font-size: 0.9rem;
            color: #8d5e3c;
            background: #fae9db;
            border-radius: 20px;
            padding: 6px 16px;
            display: inline-block;
        }

        hr {
            border: 0.5px solid #ecdccb;
            margin: 16px 0 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧋·小玉专属奶茶店</h1>
        <div class="sub-title">选一杯喜欢的，我马上帮你点 ✨</div>

        <!-- 霸王茶姬 -->
        <div class="brand">
            <h2>🍵 霸王茶姬</h2>
            <div class="tea-options" id="brand-chagee"></div>
        </div>

        <!-- 喜茶 -->
        <div class="brand">
            <h2>🍑 喜茶</h2>
            <div class="tea-options" id="brand-heytea"></div>
        </div>

        <!-- 瑞幸 -->
        <div class="brand">
            <h2>☕️ 瑞幸</h2>
            <div class="tea-options" id="brand-luckin"></div>
        </div>

        <!-- 茶百道 -->
        <div class="brand">
            <h2>🍡 茶百道</h2>
            <div class="tea-options" id="brand-chabaida"></div>
        </div>

        <!-- 一点点 -->
        <div class="brand">
            <h2>🍓 一点点</h2>
            <div class="tea-options" id="brand-yidiandian"></div>
        </div>

        <div style="background: #fdf6ef; border-radius: 30px; padding: 16px 14px; margin: 12px 0 6px;">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
                <span style="font-weight: 600; color: #63452a;">📏 杯型选择</span>
                <div class="size-row" style="margin-top: 0;">
                    <div class="size-btn active" id="size-medium">🥤 中杯</div>
                    <div class="size-btn" id="size-large">🥤 大杯</div>
                </div>
            </div>
            <textarea class="remark-box" id="remarkInput" placeholder="✏️ 小料 / 甜度 / 冰块 等备注（选填）" rows="2"></textarea>
        </div>

        <button class="btn-order" id="submitOrder">✨ 下单 · 发送给龙叔 ✨</button>
        <div class="footer-note">
            💌 下单后我会立刻去平台帮你点～
        </div>
    </div>

    <script>
        (function() {
        // ---------- 🚨 替换成你自己的 PushPlus Token ----------
        const PUSHPLUS_TOKEN = '2a756c03cc004a34b9f87cf006143898';

        // ---------- 菜单数据 ----------
        const menuData = {
        chagee:   ['青青糯山', '白雾红尘', '蜜桃乌龙'],
        heytea:   ['黑糖啵啵牛乳茶', '清爽芭乐提', '椰椰芒芒'],
        luckin:   ['小黄油拿铁', '茉莉花拿铁', '杨枝甘露'],
        chabaida: ['豆乳玉麒麟', '豆乳米麻薯'],
        yidiandian:['QQ.梅梅奶茶', '草莓米麻薯奶绿', '芒装奶绿']
        };

        const brandMap = {
        chagee: '霸王茶姬',
        heytea: '喜茶',
        luckin: '瑞幸',
        chabaida: '茶百道',
        yidiandian: '一点点'
        };

        // 当前选中的饮品 (品牌key + 饮品名)
        let selectedDrink = null;   // { brandKey, drinkName }

        // 杯型：中杯/大杯
        let currentSize = '中杯';

        // ---------- 渲染菜单卡片 ----------
        function renderMenu() {
        for (let [brandKey, drinks] of Object.entries(menuData)) {
        const container = document.getElementById(`brand-${brandKey}`);
        if (!container) continue;
        container.innerHTML = '';
        drinks.forEach(drink => {
        const card = document.createElement('div');
        card.className = 'tea-card';
        card.textContent = drink;
        card.dataset.brand = brandKey;
        card.dataset.drink = drink;
        card.addEventListener('click', function(e) {
        selectDrink(brandKey, drink);
        });
        container.appendChild(card);
        });
        }
        }

        // 高亮选中的饮品卡片
        function selectDrink(brandKey, drinkName) {
        // 移除所有卡片的 active 类
        document.querySelectorAll('.tea-card').forEach(c => c.classList.remove('active'));
        // 给当前卡片加 active
        const targetCard = document.querySelector(`.tea-card[data-brand="${brandKey}"][data-drink="${drinkName}"]`);
        if (targetCard) {
        targetCard.classList.add('active');
        }
        selectedDrink = { brandKey, drinkName };
        }

        // ---------- 杯型切换 ----------
        document.getElementById('size-medium').addEventListener('click', function() {
        setSize('中杯', this, document.getElementById('size-large'));
        });
        document.getElementById('size-large').addEventListener('click', function() {
        setSize('大杯', this, document.getElementById('size-medium'));
        });

        function setSize(size, activeEl, inactiveEl) {
        currentSize = size;
        activeEl.classList.add('active');
        inactiveEl.classList.remove('active');
        }

        // ---------- 提交订单 -> PushPlus ----------
        document.getElementById('submitOrder').addEventListener('click', async function() {
        if (!selectedDrink) {
        alert('请先选择一杯饮品哟 🧋');
        return;
        }

        const brandName = brandMap[selectedDrink.brandKey] || selectedDrink.brandKey;
        const drink = selectedDrink.drinkName;
        const size = currentSize;
        const remark = document.getElementById('remarkInput').value.trim() || '无特殊备注';

        // 组装消息内容（纯文本，方便阅读）
        const messageContent =
        `🧋 专属奶茶订单来啦！\n\n` +
        `🏷️ 品牌：${brandName}\n` +
        `🍵 饮品：${drink}\n` +
        `📏 杯型：${size}\n` +
        `📝 备注：${remark}\n\n` +
        `⏰ 下单时间：${new Date().toLocaleString()}\n` +
        `💡 快去对应平台帮她下单吧～`;

        // 调用 PushPlus API (POST 方式)
        try {
        const response = await fetch('https://www.pushplus.plus/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
        token: PUSHPLUS_TOKEN,
        title: `🧋 ${brandName} - ${drink} (${size})`,
        content: messageContent,
        template: 'txt'
        })
        });

        const result = await response.json();
        if (result.code === 200) {
        alert('✅ 下单成功！我已经收到消息，马上去帮你点～');
        } else {
        alert('⚠️ 消息发送失败: ' + (result.msg || '未知错误'));
        }
        } catch (err) {
        alert('❌ 网络请求失败，请稍后重试');
        console.error(err);
        }
        });

        // 初始化渲染
        renderMenu();
        })();
    </script>
</body>
</html>
